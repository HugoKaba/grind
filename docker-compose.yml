version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: qa_platform_db
    environment:
      POSTGRES_DB: qa_platform
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password_secure
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qa_network

  redis:
    image: redis:7-alpine
    container_name: qa_platform_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qa_network

volumes:
  postgres_data:
  redis_data:

networks:
  qa_network:
    driver: bridge
